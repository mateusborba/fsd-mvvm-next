<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="g-app" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ec4899" stop-opacity="0.22"/>
      <stop offset="30%" stop-color="#1e293b" stop-opacity="1"/>
    </linearGradient>
    <linearGradient id="g-wid" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#3b82f6" stop-opacity="0.22"/>
      <stop offset="30%" stop-color="#1e293b" stop-opacity="1"/>
    </linearGradient>
    <linearGradient id="g-fea" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f59e0b" stop-opacity="0.22"/>
      <stop offset="30%" stop-color="#1e293b" stop-opacity="1"/>
    </linearGradient>
    <linearGradient id="g-ent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#10b981" stop-opacity="0.22"/>
      <stop offset="30%" stop-color="#1e293b" stop-opacity="1"/>
    </linearGradient>
    <linearGradient id="g-sha" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#6366f1" stop-opacity="0.22"/>
      <stop offset="30%" stop-color="#1e293b" stop-opacity="1"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="#0f172a"/>

  <!-- Dot grid -->
  <pattern id="dots" width="24" height="24" patternUnits="userSpaceOnUse">
    <circle cx="1" cy="1" r="0.8" fill="#1e293b"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#dots)"/>

  <!-- Title -->
  <text x="600" y="46" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="32" font-weight="700" fill="#f1f5f9">Feature-Sliced Design</text>
  <text x="600" y="72" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="15" fill="#64748b">Arquitetura em camadas com responsabilidades bem definidas</text>

  <!-- Dependency direction indicator -->
  <line x1="88" y1="118" x2="88" y2="548" stroke="#334155" stroke-width="1.5" stroke-dasharray="5,5"/>
  <polygon points="88,550 83,536 93,536" fill="#475569"/>
  <text x="76" y="336" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#475569" transform="rotate(-90, 76, 336)">fluxo de dependencia (de cima para baixo)</text>

  <!-- Rule box -->
  <rect x="946" y="248" width="224" height="96" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="1058" y="270" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" fill="#94a3b8">Regra fundamental</text>
  <line x1="958" y1="278" x2="1158" y2="278" stroke="#334155" stroke-width="0.5"/>
  <text x="1058" y="298" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#f1f5f9">Camadas superiores</text>
  <text x="1058" y="315" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#f1f5f9">importam das inferiores.</text>
  <text x="1058" y="334" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="700" fill="#ef4444">Nunca o contrario.</text>

  <!-- ===== APP LAYER y=100 ===== -->
  <rect x="112" y="100" width="820" height="74" rx="8" fill="url(#g-app)" stroke="#ec489928" stroke-width="1"/>
  <rect x="112" y="100" width="7" height="74" rx="3" fill="#ec4899"/>
  <circle cx="157" cy="137" r="19" fill="#ec489918"/>
  <text x="157" y="143" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="15" font-weight="800" fill="#ec4899">A</text>
  <text x="192" y="128" font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="700" fill="#f1f5f9">app/</text>
  <text x="192" y="153" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#94a3b8">Rotas Next.js — ponto de entrada da aplicacao</text>
  <text x="590" y="128" font-family="'Courier New', Courier, monospace" font-size="12" fill="#ec489970">(features)/dashboard/page.tsx</text>
  <text x="590" y="152" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#475569">Renderiza widgets. Sem logica alguma.</text>

  <!-- arrow -->
  <text x="522" y="192" text-anchor="middle" font-family="Inter, sans-serif" font-size="20" fill="#334155">↓</text>

  <!-- ===== WIDGETS LAYER y=198 ===== -->
  <rect x="112" y="198" width="820" height="74" rx="8" fill="url(#g-wid)" stroke="#3b82f628" stroke-width="1"/>
  <rect x="112" y="198" width="7" height="74" rx="3" fill="#3b82f6"/>
  <circle cx="157" cy="235" r="19" fill="#3b82f618"/>
  <text x="157" y="241" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="15" font-weight="800" fill="#3b82f6">W</text>
  <text x="192" y="226" font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="700" fill="#f1f5f9">widgets/</text>
  <text x="192" y="251" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#94a3b8">Blocos de UI completos, compostos por features</text>
  <text x="590" y="226" font-family="'Courier New', Courier, monospace" font-size="12" fill="#3b82f670">product-dashboard/  ·  app-layout/</text>
  <text x="590" y="250" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#475569">Combina features + gerencia estado do bloco.</text>

  <!-- arrow -->
  <text x="522" y="290" text-anchor="middle" font-family="Inter, sans-serif" font-size="20" fill="#334155">↓</text>

  <!-- ===== FEATURES LAYER y=296 ===== -->
  <rect x="112" y="296" width="820" height="74" rx="8" fill="url(#g-fea)" stroke="#f59e0b28" stroke-width="1"/>
  <rect x="112" y="296" width="7" height="74" rx="3" fill="#f59e0b"/>
  <circle cx="157" cy="333" r="19" fill="#f59e0b18"/>
  <text x="157" y="339" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="15" font-weight="800" fill="#f59e0b">F</text>
  <text x="192" y="324" font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="700" fill="#f1f5f9">features/</text>
  <text x="192" y="349" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#94a3b8">Logica de negocio — hooks React Query + UI de feature</text>
  <text x="590" y="324" font-family="'Courier New', Courier, monospace" font-size="12" fill="#f59e0b70">product/api  ·  product/model  ·  product/ui</text>
  <text x="590" y="348" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#475569">Orquestra entity API com estado reativo.</text>

  <!-- arrow -->
  <text x="522" y="388" text-anchor="middle" font-family="Inter, sans-serif" font-size="20" fill="#334155">↓</text>

  <!-- ===== ENTITIES LAYER y=394 ===== -->
  <rect x="112" y="394" width="820" height="74" rx="8" fill="url(#g-ent)" stroke="#10b98128" stroke-width="1"/>
  <rect x="112" y="394" width="7" height="74" rx="3" fill="#10b981"/>
  <circle cx="157" cy="431" r="19" fill="#10b98118"/>
  <text x="157" y="437" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="15" font-weight="800" fill="#10b981">E</text>
  <text x="192" y="422" font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="700" fill="#f1f5f9">entities/</text>
  <text x="192" y="447" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#94a3b8">Tipos TypeScript, mocks e funcoes de API puras do dominio</text>
  <text x="590" y="422" font-family="'Courier New', Courier, monospace" font-size="12" fill="#10b98170">product/model  ·  product/api</text>
  <text x="590" y="446" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#475569">Sem estado React. Sem logica de negocio.</text>

  <!-- arrow -->
  <text x="522" y="486" text-anchor="middle" font-family="Inter, sans-serif" font-size="20" fill="#334155">↓</text>

  <!-- ===== SHARED LAYER y=492 ===== -->
  <rect x="112" y="492" width="820" height="74" rx="8" fill="url(#g-sha)" stroke="#6366f128" stroke-width="1"/>
  <rect x="112" y="492" width="7" height="74" rx="3" fill="#6366f1"/>
  <circle cx="157" cy="529" r="19" fill="#6366f118"/>
  <text x="157" y="535" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="15" font-weight="800" fill="#6366f1">S</text>
  <text x="192" y="520" font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="700" fill="#f1f5f9">shared/</text>
  <text x="192" y="545" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#94a3b8">Utilitarios base — UI reutilizavel, http-client, lib/utils</text>
  <text x="590" y="520" font-family="'Courier New', Courier, monospace" font-size="12" fill="#6366f170">ui/  ·  api/http-client/  ·  lib/utils.ts</text>
  <text x="590" y="544" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#475569">Zero dependencias de dominio de negocio.</text>

  <!-- Footer -->
  <text x="600" y="610" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#334155">Feature-Sliced Design  ·  Next.js  ·  Gestao de Produtos</text>
</svg>
