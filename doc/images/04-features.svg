<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <!-- Background -->
  <rect width="1200" height="630" fill="#0f172a"/>
  <pattern id="dots" width="24" height="24" patternUnits="userSpaceOnUse">
    <circle cx="1" cy="1" r="0.8" fill="#1e293b"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#dots)"/>

  <!-- ===== LEFT PANEL ===== -->

  <!-- Layer badge -->
  <rect x="48" y="48" width="104" height="28" rx="14" fill="#f59e0b20" stroke="#f59e0b40" stroke-width="1"/>
  <text x="100" y="67" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" fill="#f59e0b">features/</text>

  <!-- Title -->
  <text x="48" y="118" font-family="Inter, system-ui, sans-serif" font-size="36" font-weight="800" fill="#f1f5f9">A Logica</text>
  <text x="48" y="160" font-family="Inter, system-ui, sans-serif" font-size="36" font-weight="800" fill="#f59e0b">de Negocio</text>

  <!-- Divider -->
  <line x1="48" y1="178" x2="300" y2="178" stroke="#f59e0b" stroke-width="2"/>

  <!-- Responsibility -->
  <text x="48" y="210" font-family="Inter, system-ui, sans-serif" font-size="15" fill="#94a3b8">Orquestra a API da entity com</text>
  <text x="48" y="232" font-family="Inter, system-ui, sans-serif" font-size="15" fill="#94a3b8">estado reativo (React Query).</text>

  <!-- Structure -->
  <text x="48" y="278" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="#64748b">ESTRUTURA DO SLICE</text>

  <rect x="48" y="292" width="6" height="22" rx="3" fill="#f59e0b"/>
  <text x="64" y="308" font-family="'Courier New', Courier, monospace" font-size="13" font-weight="600" fill="#f1f5f9">features/product/api/</text>
  <text x="64" y="328" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#64748b">use-get-products  ·  use-create-product</text>
  <text x="64" y="344" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#64748b">use-update-product  ·  use-delete-product</text>

  <rect x="48" y="362" width="6" height="22" rx="3" fill="#f59e0b"/>
  <text x="64" y="378" font-family="'Courier New', Courier, monospace" font-size="13" font-weight="600" fill="#f1f5f9">features/product/model/</text>
  <text x="64" y="398" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#64748b">product-card.model.ts  ·  products.consts.ts</text>

  <rect x="48" y="416" width="6" height="22" rx="3" fill="#f59e0b"/>
  <text x="64" y="432" font-family="'Courier New', Courier, monospace" font-size="13" font-weight="600" fill="#f1f5f9">features/product/ui/</text>
  <text x="64" y="452" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#64748b">product-card  ·  product-list</text>
  <text x="64" y="468" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#64748b">create-product-dialog  ·  edit-product-drawer</text>

  <!-- Rule box -->
  <rect x="48" y="494" width="460" height="72" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="68" y="516" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="#f59e0b">Regra:</text>
  <text x="68" y="536" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#94a3b8">features/ importa de entities/ e shared/.</text>
  <text x="68" y="556" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#94a3b8">Nunca de widgets/ ou app/.</text>

  <!-- Vertical divider -->
  <line x1="560" y1="40" x2="560" y2="590" stroke="#1e293b" stroke-width="2"/>

  <!-- ===== RIGHT PANEL — CODE ===== -->
  <rect x="580" y="48" width="580" height="534" rx="10" fill="#1e293b"/>
  <rect x="580" y="48" width="580" height="38" rx="10" fill="#0f172a"/>
  <rect x="580" y="72" width="580" height="14" fill="#0f172a"/>
  <circle cx="608" cy="67" r="5" fill="#ef4444" fill-opacity="0.7"/>
  <circle cx="628" cy="67" r="5" fill="#f59e0b" fill-opacity="0.7"/>
  <circle cx="648" cy="67" r="5" fill="#10b981" fill-opacity="0.7"/>
  <text x="672" y="71" font-family="'Courier New', Courier, monospace" font-size="12" fill="#475569">features/product/api/use-get-products.ts</text>

  <!-- Code: use-get-products.ts -->
  <text font-family="'Courier New', Courier, monospace" font-size="14.5" xml:space="preserve">
    <tspan x="606" y="116" fill="#64748b">"use client"</tspan>

    <tspan x="606" dy="30" fill="#818cf8">import </tspan><tspan fill="#e2e8f0">{ useQuery } from </tspan><tspan fill="#fbbf24">"@tanstack/react-query"</tspan>
    <tspan x="606" dy="22" fill="#818cf8">import </tspan><tspan fill="#e2e8f0">{ getProducts } from </tspan><tspan fill="#fbbf24">"@/entities/product/api/get-products"</tspan>
    <tspan x="606" dy="22" fill="#818cf8">import </tspan><tspan fill="#e2e8f0">{ PRODUCTS_QUERY_KEY } from </tspan><tspan fill="#fbbf24">"../model/products.consts"</tspan>

    <tspan x="606" dy="32" fill="#818cf8">export function </tspan><tspan fill="#60a5fa">useGetProducts</tspan><tspan fill="#e2e8f0">() {</tspan>
    <tspan x="606" dy="22" fill="#818cf8">  return </tspan><tspan fill="#60a5fa">useQuery</tspan><tspan fill="#e2e8f0">({</tspan>
    <tspan x="606" dy="22" fill="#e2e8f0">    queryKey: PRODUCTS_QUERY_KEY,</tspan>
    <tspan x="606" dy="22" fill="#e2e8f0">    queryFn: getProducts, </tspan><tspan fill="#64748b">// ← funcao da entity</tspan>
    <tspan x="606" dy="22" fill="#e2e8f0">  })</tspan>
    <tspan x="606" dy="22" fill="#e2e8f0">}</tspan>
  </text>

  <!-- Second file divider -->
  <line x1="594" y1="358" x2="1146" y2="358" stroke="#334155" stroke-width="1" stroke-dasharray="4,4"/>
  <text x="672" y="376" font-family="'Courier New', Courier, monospace" font-size="12" fill="#475569">features/product/model/product-card.model.ts</text>

  <!-- Code: product-card.model.ts -->
  <text font-family="'Courier New', Courier, monospace" font-size="14.5" xml:space="preserve">
    <tspan x="606" y="402" fill="#818cf8">export const </tspan><tspan fill="#60a5fa">useProductCard </tspan><tspan fill="#94a3b8">= </tspan><tspan fill="#e2e8f0">(product: </tspan><tspan fill="#34d399">Product</tspan><tspan fill="#e2e8f0">) =&gt; {</tspan>
    <tspan x="606" dy="22" fill="#818cf8">  const </tspan><tspan fill="#e2e8f0">colorIdx </tspan><tspan fill="#94a3b8">= </tspan><tspan fill="#e2e8f0">product.id </tspan><tspan fill="#94a3b8">% </tspan><tspan fill="#e2e8f0">ACCENT_COLORS.length</tspan>
    <tspan x="606" dy="22" fill="#818cf8">  const </tspan><tspan fill="#e2e8f0">formattedPrice </tspan><tspan fill="#94a3b8">= </tspan><tspan fill="#818cf8">new </tspan><tspan fill="#34d399">Intl.NumberFormat</tspan><tspan fill="#e2e8f0">(</tspan><tspan fill="#fbbf24">"pt-BR"</tspan><tspan fill="#e2e8f0">, {</ttml></tspan>
    <tspan x="606" dy="22" fill="#e2e8f0">    style: </tspan><tspan fill="#fbbf24">"currency"</tspan><tspan fill="#e2e8f0">, currency: </tspan><tspan fill="#fbbf24">"BRL"</tspan><tspan fill="#e2e8f0">,</tspan>
    <tspan x="606" dy="22" fill="#e2e8f0">  }).</tspan><tspan fill="#60a5fa">format</tspan><tspan fill="#e2e8f0">(product.price)</tspan>

    <tspan x="606" dy="26" fill="#818cf8">  return </tspan><tspan fill="#e2e8f0">{ accent: ACCENT_COLORS[colorIdx], formattedPrice }</tspan>
    <tspan x="606" dy="22" fill="#e2e8f0">}</tspan>
  </text>

  <!-- Footer -->
  <text x="600" y="615" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#334155">Feature-Sliced Design  ·  Camada 3 de 5  ·  features/</text>
</svg>
