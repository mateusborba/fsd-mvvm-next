<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <!-- Background -->
  <rect width="1200" height="630" fill="#0f172a"/>
  <pattern id="dots" width="24" height="24" patternUnits="userSpaceOnUse">
    <circle cx="1" cy="1" r="0.8" fill="#1e293b"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#dots)"/>

  <!-- ===== TITLE ===== -->
  <text x="600" y="50" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="30" font-weight="800" fill="#f1f5f9">Slices — O Corte Vertical</text>
  <text x="600" y="78" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="15" fill="#64748b">Cada dominio de negocio vive isolado dentro de cada camada</text>

  <!-- ===== GRID LAYOUT ===== -->
  <!-- Grid starts at x=80, y=108 -->
  <!-- Column widths: layer label=180, product=260, orders=230, auth=230 -->
  <!-- Row heights: header=48, each row=74 -->

  <!-- Column headers -->
  <!-- Layer column header -->
  <rect x="80" y="108" width="180" height="48" rx="6" fill="#0f172a"/>
  <text x="170" y="138" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="#475569">CAMADA</text>

  <!-- Slice: product -->
  <rect x="272" y="108" width="260" height="48" rx="6" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="402" y="128" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="700" fill="#f1f5f9">slice: product</text>
  <text x="402" y="148" text-anchor="middle" font-family="'Courier New', Courier, monospace" font-size="11" fill="#64748b">entities/ + features/ + widgets/</text>

  <!-- Slice: orders (planned) -->
  <rect x="546" y="108" width="230" height="48" rx="6" fill="#0f172a" stroke="#1e293b" stroke-width="1" stroke-dasharray="5,4"/>
  <text x="661" y="128" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="#334155">slice: orders</text>
  <text x="661" y="148" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#334155">planejado</text>

  <!-- Slice: auth (planned) -->
  <rect x="790" y="108" width="230" height="48" rx="6" fill="#0f172a" stroke="#1e293b" stroke-width="1" stroke-dasharray="5,4"/>
  <text x="905" y="128" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="#334155">slice: auth</text>
  <text x="905" y="148" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#334155">planejado</text>

  <!-- ===== ROWS ===== -->

  <!-- ROW: app  y=168 -->
  <rect x="80" y="168" width="180" height="64" rx="6" fill="#ec489915" stroke="#ec489930" stroke-width="1"/>
  <text x="170" y="197" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="15" font-weight="700" fill="#ec4899">app/</text>
  <text x="170" y="218" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#ec489880">Rotas Next.js</text>

  <rect x="272" y="168" width="260" height="64" rx="6" fill="#1e293b" stroke="#ec489930" stroke-width="1"/>
  <text x="402" y="195" text-anchor="middle" font-family="'Courier New', Courier, monospace" font-size="12" fill="#ec4899">(features)/dashboard/</text>
  <text x="402" y="215" text-anchor="middle" font-family="'Courier New', Courier, monospace" font-size="12" fill="#ec489870">page.tsx</text>

  <rect x="546" y="168" width="230" height="64" rx="6" fill="#0f172a" stroke="#1e293b" stroke-width="1" stroke-dasharray="4,4"/>
  <text x="661" y="204" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#1e293b">—</text>
  <rect x="790" y="168" width="230" height="64" rx="6" fill="#0f172a" stroke="#1e293b" stroke-width="1" stroke-dasharray="4,4"/>
  <text x="905" y="204" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#1e293b">—</text>

  <!-- ROW: widgets  y=244 -->
  <rect x="80" y="244" width="180" height="64" rx="6" fill="#3b82f615" stroke="#3b82f630" stroke-width="1"/>
  <text x="170" y="273" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="15" font-weight="700" fill="#3b82f6">widgets/</text>
  <text x="170" y="294" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#3b82f680">Composicao UI</text>

  <rect x="272" y="244" width="260" height="64" rx="6" fill="#1e293b" stroke="#3b82f630" stroke-width="1"/>
  <text x="402" y="271" text-anchor="middle" font-family="'Courier New', Courier, monospace" font-size="12" fill="#3b82f6">product-dashboard/</text>
  <text x="402" y="291" text-anchor="middle" font-family="'Courier New', Courier, monospace" font-size="12" fill="#3b82f670">ui/  ·  model/</text>

  <rect x="546" y="244" width="230" height="64" rx="6" fill="#0f172a" stroke="#1e293b" stroke-width="1" stroke-dasharray="4,4"/>
  <rect x="790" y="244" width="230" height="64" rx="6" fill="#0f172a" stroke="#1e293b" stroke-width="1" stroke-dasharray="4,4"/>

  <!-- ROW: features  y=320 -->
  <rect x="80" y="320" width="180" height="64" rx="6" fill="#f59e0b15" stroke="#f59e0b30" stroke-width="1"/>
  <text x="170" y="349" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="15" font-weight="700" fill="#f59e0b">features/</text>
  <text x="170" y="370" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#f59e0b80">Logica negocio</text>

  <rect x="272" y="320" width="260" height="64" rx="6" fill="#1e293b" stroke="#f59e0b30" stroke-width="1"/>
  <text x="402" y="347" text-anchor="middle" font-family="'Courier New', Courier, monospace" font-size="12" fill="#f59e0b">product/</text>
  <text x="402" y="367" text-anchor="middle" font-family="'Courier New', Courier, monospace" font-size="12" fill="#f59e0b70">api/  ·  model/  ·  ui/</text>

  <rect x="546" y="320" width="230" height="64" rx="6" fill="#0f172a" stroke="#1e293b" stroke-width="1" stroke-dasharray="4,4"/>
  <rect x="790" y="320" width="230" height="64" rx="6" fill="#0f172a" stroke="#1e293b" stroke-width="1" stroke-dasharray="4,4"/>

  <!-- ROW: entities  y=396 -->
  <rect x="80" y="396" width="180" height="64" rx="6" fill="#10b98115" stroke="#10b98130" stroke-width="1"/>
  <text x="170" y="425" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="15" font-weight="700" fill="#10b981">entities/</text>
  <text x="170" y="446" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#10b98180">Tipos + API pura</text>

  <rect x="272" y="396" width="260" height="64" rx="6" fill="#1e293b" stroke="#10b98130" stroke-width="1"/>
  <text x="402" y="423" text-anchor="middle" font-family="'Courier New', Courier, monospace" font-size="12" fill="#10b981">product/</text>
  <text x="402" y="443" text-anchor="middle" font-family="'Courier New', Courier, monospace" font-size="12" fill="#10b98170">model/  ·  api/</text>

  <rect x="546" y="396" width="230" height="64" rx="6" fill="#0f172a" stroke="#1e293b" stroke-width="1" stroke-dasharray="4,4"/>
  <rect x="790" y="396" width="230" height="64" rx="6" fill="#0f172a" stroke="#1e293b" stroke-width="1" stroke-dasharray="4,4"/>

  <!-- ROW: shared  y=472 (shared has no slices) -->
  <rect x="80" y="472" width="180" height="64" rx="6" fill="#6366f115" stroke="#6366f130" stroke-width="1"/>
  <text x="170" y="501" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="15" font-weight="700" fill="#6366f1">shared/</text>
  <text x="170" y="522" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#6366f180">Base reutilizavel</text>

  <!-- shared spans all slices -->
  <rect x="272" y="472" width="748" height="64" rx="6" fill="#6366f110" stroke="#6366f130" stroke-width="1" stroke-dasharray="4,0"/>
  <text x="646" y="499" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#6366f1">ui/  ·  api/http-client/  ·  lib/utils.ts</text>
  <text x="646" y="519" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#6366f170">shared/ nao tem slices — e compartilhado por todo o projeto</text>

  <!-- Vertical highlight for product slice -->
  <rect x="272" y="108" width="260" height="428" rx="6" fill="none" stroke="#475569" stroke-width="2" stroke-dasharray="8,4"/>

  <!-- Product slice label -->
  <text x="1070" y="310" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#64748b" transform="rotate(90, 1070, 310)">corte vertical do dominio</text>

  <!-- Insight box -->
  <rect x="1040" y="168" width="148" height="368" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="1114" y="195" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" fill="#94a3b8">Insight</text>
  <line x1="1052" y1="202" x2="1176" y2="202" stroke="#334155" stroke-width="0.5"/>
  <text x="1114" y="226" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#f1f5f9">Adicionar um</text>
  <text x="1114" y="244" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#f1f5f9">novo dominio</text>
  <text x="1114" y="262" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#f1f5f9">(ex: orders)</text>
  <text x="1114" y="294" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#94a3b8">nao toca em</text>
  <text x="1114" y="312" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#94a3b8">nenhum arquivo</text>
  <text x="1114" y="330" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#94a3b8">de product.</text>
  <text x="1114" y="366" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="700" fill="#34d399">Isolamento</text>
  <text x="1114" y="384" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="700" fill="#34d399">total.</text>

  <!-- Footer -->
  <text x="600" y="615" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#334155">Feature-Sliced Design  ·  Slices (corte vertical)  ·  produto isolado por dominio</text>
</svg>
