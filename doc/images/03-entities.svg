<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <!-- Background -->
  <rect width="1200" height="630" fill="#0f172a"/>
  <pattern id="dots" width="24" height="24" patternUnits="userSpaceOnUse">
    <circle cx="1" cy="1" r="0.8" fill="#1e293b"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#dots)"/>

  <!-- ===== LEFT PANEL ===== -->

  <!-- Layer badge -->
  <rect x="48" y="48" width="104" height="28" rx="14" fill="#10b98120" stroke="#10b98140" stroke-width="1"/>
  <text x="100" y="67" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" fill="#10b981">entities/</text>

  <!-- Title -->
  <text x="48" y="118" font-family="Inter, system-ui, sans-serif" font-size="36" font-weight="800" fill="#f1f5f9">O Nucleo</text>
  <text x="48" y="160" font-family="Inter, system-ui, sans-serif" font-size="36" font-weight="800" fill="#10b981">do Dominio</text>

  <!-- Divider -->
  <line x1="48" y1="178" x2="300" y2="178" stroke="#10b981" stroke-width="2"/>

  <!-- Responsibility -->
  <text x="48" y="210" font-family="Inter, system-ui, sans-serif" font-size="15" fill="#94a3b8">Define os tipos e as chamadas</text>
  <text x="48" y="232" font-family="Inter, system-ui, sans-serif" font-size="15" fill="#94a3b8">de API — sem estado React.</text>

  <!-- What it contains -->
  <text x="48" y="278" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="#64748b">ESTRUTURA DO SLICE</text>

  <!-- model -->
  <rect x="48" y="292" width="6" height="22" rx="3" fill="#10b981"/>
  <text x="64" y="308" font-family="'Courier New', Courier, monospace" font-size="13" font-weight="600" fill="#f1f5f9">entities/product/model/</text>
  <text x="64" y="328" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#64748b">product.type.ts  ·  product.mock.ts</text>

  <!-- api -->
  <rect x="48" y="348" width="6" height="22" rx="3" fill="#10b981"/>
  <text x="64" y="364" font-family="'Courier New', Courier, monospace" font-size="13" font-weight="600" fill="#f1f5f9">entities/product/api/</text>
  <text x="64" y="384" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#64748b">get-products.ts  ·  create-product.ts</text>
  <text x="64" y="400" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#64748b">update-product.ts  ·  delete-product.ts</text>

  <!-- Constraints -->
  <text x="48" y="438" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="#64748b">RESTRICOES</text>
  <text x="48" y="462" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#94a3b8">✗  Nao usa useState / useQuery</text>
  <text x="48" y="484" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#94a3b8">✗  Nao importa de features/ ou widgets/</text>
  <text x="48" y="506" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#34d399">✓  Importa apenas de shared/</text>

  <!-- Rule box -->
  <rect x="48" y="528" width="440" height="52" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="68" y="550" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="#f59e0b">Regra:</text>
  <text x="68" y="570" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#94a3b8">funcoes puras async — features/ adicionam o estado reativo.</text>

  <!-- Vertical divider -->
  <line x1="560" y1="40" x2="560" y2="590" stroke="#1e293b" stroke-width="2"/>

  <!-- ===== RIGHT PANEL — CODE ===== -->
  <rect x="580" y="48" width="580" height="534" rx="10" fill="#1e293b"/>
  <rect x="580" y="48" width="580" height="38" rx="10" fill="#0f172a"/>
  <rect x="580" y="72" width="580" height="14" fill="#0f172a"/>
  <circle cx="608" cy="67" r="5" fill="#ef4444" fill-opacity="0.7"/>
  <circle cx="628" cy="67" r="5" fill="#f59e0b" fill-opacity="0.7"/>
  <circle cx="648" cy="67" r="5" fill="#10b981" fill-opacity="0.7"/>
  <text x="672" y="71" font-family="'Courier New', Courier, monospace" font-size="12" fill="#475569">entities/product/model/product.type.ts</text>

  <!-- Code: product.type.ts -->
  <text font-family="'Courier New', Courier, monospace" font-size="14.5" xml:space="preserve">
    <tspan x="606" y="116" fill="#818cf8">export interface </tspan><tspan fill="#34d399">Product </tspan><tspan fill="#e2e8f0">{</tspan>
    <tspan x="606" dy="24" fill="#e2e8f0">  id</tspan><tspan fill="#94a3b8">: </tspan><tspan fill="#34d399">number</tspan>
    <tspan x="606" dy="22" fill="#e2e8f0">  name</tspan><tspan fill="#94a3b8">: </tspan><tspan fill="#34d399">string</tspan>
    <tspan x="606" dy="22" fill="#e2e8f0">  description</tspan><tspan fill="#94a3b8">: </tspan><tspan fill="#34d399">string</tspan>
    <tspan x="606" dy="22" fill="#e2e8f0">  price</tspan><tspan fill="#94a3b8">: </tspan><tspan fill="#34d399">number</tspan>
    <tspan x="606" dy="22" fill="#e2e8f0">}</tspan>

    <tspan x="606" dy="28" fill="#818cf8">export type </tspan><tspan fill="#34d399">CreateProductDto </tspan><tspan fill="#94a3b8">= </tspan><tspan fill="#34d399">Omit</tspan><tspan fill="#e2e8f0">&lt;</tspan><tspan fill="#34d399">Product</tspan><tspan fill="#e2e8f0">, </tspan><tspan fill="#fbbf24">"id"</tspan><tspan fill="#e2e8f0">&gt;</tspan>
    <tspan x="606" dy="22" fill="#818cf8">export type </tspan><tspan fill="#34d399">UpdateProductDto </tspan><tspan fill="#94a3b8">= </tspan><tspan fill="#34d399">Partial</tspan><tspan fill="#e2e8f0">&lt;</tspan><tspan fill="#34d399">CreateProductDto</tspan><tspan fill="#e2e8f0">&gt;</tspan>
  </text>

  <!-- Second file divider -->
  <line x1="594" y1="352" x2="1146" y2="352" stroke="#334155" stroke-width="1" stroke-dasharray="4,4"/>
  <text x="672" y="370" font-family="'Courier New', Courier, monospace" font-size="12" fill="#475569">entities/product/api/get-products.ts</text>

  <!-- Code: get-products.ts -->
  <text font-family="'Courier New', Courier, monospace" font-size="14.5" xml:space="preserve">
    <tspan x="606" y="396" fill="#818cf8">import type </tspan><tspan fill="#e2e8f0">{ </tspan><tspan fill="#34d399">Product </tspan><tspan fill="#e2e8f0">} from </tspan><tspan fill="#fbbf24">"../model/product.type"</tspan>
    <tspan x="606" dy="22" fill="#818cf8">import </tspan><tspan fill="#e2e8f0">{ productMockStore, delay } from </tspan><tspan fill="#fbbf24">"./_mock-store"</tspan>

    <tspan x="606" dy="32" fill="#64748b">// Substituir por httpClient quando houver backend:</tspan>
    <tspan x="606" dy="22" fill="#64748b">// httpClient.request&lt;Product[]&gt;({ type: "GET", ... })</tspan>

    <tspan x="606" dy="32" fill="#818cf8">export async function </tspan><tspan fill="#60a5fa">getProducts</tspan><tspan fill="#e2e8f0">(): </tspan><tspan fill="#34d399">Promise</tspan><tspan fill="#e2e8f0">&lt;</tspan><tspan fill="#34d399">Product</tspan><tspan fill="#e2e8f0">[]&gt; {</tspan>
    <tspan x="606" dy="22" fill="#818cf8">  await </tspan><tspan fill="#60a5fa">delay</tspan><tspan fill="#e2e8f0">()</tspan>
    <tspan x="606" dy="22" fill="#818cf8">  return </tspan><tspan fill="#60a5fa">structuredClone</tspan><tspan fill="#e2e8f0">(productMockStore.items)</tspan>
    <tspan x="606" dy="22" fill="#e2e8f0">}</tspan>
  </text>

  <!-- Footer -->
  <text x="600" y="615" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#334155">Feature-Sliced Design  ·  Camada 2 de 5  ·  entities/</text>
</svg>
